audio:
  sample_rate: 16000
  chunk_duration_ms: 30
  frame_duration_ms: 30
  silence_timeout_ms: 1500
  vad_aggressiveness: 2
  hotkey: "right ctrl"
  wake_word: "computer"        # free Porcupine keywords: computer, jarvis, alexa, hey google, ok google, etc.
  wake_word_model_path: null

stt:
  provider: groq
  model: whisper-large-v3
  api_key: null
  language: en

llm:
  provider: cerebras          # or "cerebras" or "openai"
  model: gpt-oss-120b
  api_key: null           # uses GROQ_API_KEY env var if null
  fallback_provider: openai
  fallback_model: gpt-4o-mini
  fallback_api_key: null  # uses OPENAI_API_KEY env var if null
  cerebras_api_key: null  # uses CEREBRAS_API_KEY env var if null
  temperature: 0.1
  max_tokens: 1024

tts:
  provider: edge
  voice: en-US-AriaNeural
  enabled: true
  speed: "+0%"

computer_use:
  provider: codex          # "codex" uses the local Codex CLI (OAuth via ChatGPT subscription)
  api_key: null            # not used for codex — Codex CLI authenticates via `codex login`
  model: claude-sonnet     # only used when provider is "anthropic"; ignored for codex
  confidence_threshold: 0.8

safety:
  confirm_destructive: true
  destructive_keywords:
    - close
    - quit
    - delete
    - remove
    - kill
    - terminate
    - shutdown
    - reboot
    - format
    - rm -rf
    - type password
    - enter password
    - input password
  confirmation_timeout_seconds: 10

app:
  preferred_browser: chrome
  preferred_terminal: cmd
  codex_app_name: Codex
  dry_run: false
  aliases:
    # Map spoken names / STT hallucinations to exact Windows app names.
    # Keys = what the user (or Whisper) might say.
    # Values = exact name Windows understands via os.startfile().
    comet: "Comet Browser"
    # Add more as needed:
    # vscode: "Visual Studio Code"
    # edge: "Microsoft Edge"

plugins:
  grok_voice:
    enabled: false
    api_key: null
    model: grok-voice-think-fast-1.0
    voice: Eve
    instructions: >-
      You are a desktop voice assistant. You can open apps, focus windows,
      click elements using computer vision, type text, search the browser,
      and execute safe system commands.
    sample_rate: 24000
    turn_detection_type: server_vad
    input_audio_transcription_model: grok-2-audio
    tools:
      - open_app
      - focus_window
      - click_element
      - type_text
      - browser_search
      - execute_system
