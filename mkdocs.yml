site_name: VoiceUse Documentation
site_description: Documentation for VoiceUse — a local desktop voice agent that controls your OS hands-free.
site_url: https://computer-use.agentmemorylabs.com/docs/
repo_name: jarmen423/voice-computer-use-agent
repo_url: https://github.com/jarmen423/voice-computer-use-agent
docs_dir: docs

nav:
  - Getting Started: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Plugins: plugins.md
  - Safety: safety.md
  - Troubleshooting: troubleshooting.md
  - Development: development.md
  - Architecture: architecture.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: cyan
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg

plugins:
  - search
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jarmen423/voice-computer-use-agent

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - tables
  - toc:
      permalink: true
      toc_depth: 3

extra_css:
  - stylesheets/extra.css
